<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AccessToExcess</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body { font-family: Arial; margin:0; background:#f5f7f9; }

.header {
    background:#16a34a;
    color:white;
    padding:15px;
    text-align:center;
}

.container { padding:15px; }

.hidden { display:none; }

.card {
    background:white;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    box-shadow:0 3px 8px rgba(0,0,0,0.08);
}

button {
    width:100%;
    padding:10px;
    margin-top:8px;
    background:#16a34a;
    color:white;
    border:none;
    border-radius:8px;
}

input {
    width:100%;
    padding:10px;
    margin-top:8px;
    border-radius:8px;
    border:1px solid #ddd;
}

.nav button {
    width:auto;
    margin-right:5px;
}
</style>
</head>

<body>

<div class="header">AccessToExcess</div>

<div class="container">

<div class="nav">
    <button onclick="showView('user')">User View</button>
    <button onclick="showView('admin')">Admin Dashboard</button>
</div>

<!-- USER VIEW -->
<div id="userView">

    <h3>Stores</h3>
    <div id="stores"></div>

    <h3>Cart</h3>
    <div id="cart"></div>
    <button onclick="checkout()">Checkout</button>

    <div id="map" style="height:300px;margin-top:15px;"></div>

</div>

<!-- ADMIN VIEW -->
<div id="adminView" class="hidden">

    <h3>Admin Dashboard</h3>

    <div class="card">
        <h4>Add Store</h4>
        <input id="storeName" placeholder="Store Name">
        <button onclick="addStore()">Add Store</button>
    </div>

    <div class="card">
        <h4>Orders</h4>
        <div id="orders"></div>
    </div>

</div>

</div>

<script>
/* FIREBASE CONFIG */
const firebaseConfig = {
    apiKey: "YOUR_KEY",
    authDomain: "YOUR_DOMAIN",
    projectId: "YOUR_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* STATE */
let cart = [];

/* NAV */
function showView(view) {
    document.getElementById("userView").classList.add("hidden");
    document.getElementById("adminView").classList.add("hidden");

    if (view === "user") {
        document.getElementById("userView").classList.remove("hidden");
    } else {
        document.getElementById("adminView").classList.remove("hidden");
    }
}

/* STORES */
let stores = [
    { name: "Walmart" },
    { name: "Target" }
];

function loadStores() {
    const div = document.getElementById("stores");
    div.innerHTML = "";

    stores.forEach(store => {
        const el = document.createElement("div");
        el.className = "card";
        el.innerHTML = `
            <h4>${store.name}</h4>
            <button onclick="addToCart('${store.name}')">Add Item</button>
        `;
        div.appendChild(el);
    });
}

/* CART */
function addToCart(store) {
    cart.push({ store, item: "Sample Item" });
    renderCart();
}

function renderCart() {
    const div = document.getElementById("cart");
    div.innerHTML = cart.map(c => `${c.store} - ${c.item}`).join("<br>");
}

/* CHECKOUT */
function checkout() {
    const order = {
        items: cart,
        created: new Date()
    };

    db.collection("orders").add(order);
    alert("Order placed!");

    cart = [];
    renderCart();
}

/* ADMIN - ADD STORE */
function addStore() {
    const name = storeName.value;
    stores.push({ name });
    loadStores();
    storeName.value = "";
}

/* ADMIN - LOAD ORDERS */
function loadOrders() {
    const div = document.getElementById("orders");

    db.collection("orders").onSnapshot(snapshot => {
        div.innerHTML = "";
        snapshot.forEach(doc => {
            const o = doc.data();
            const el = document.createElement("div");
            el.className = "card";
            el.innerHTML = `
                <p><b>Items:</b> ${JSON.stringify(o.items)}</p>
            `;
            div.appendChild(el);
        });
    });
}

/* MAP */
function initMap() {
    navigator.geolocation.getCurrentPosition(pos => {
        const loc = {
            lat: pos.coords.latitude,
            lng: pos.coords.longitude
        };

        const map = new google.maps.Map(document.getElementById("map"), {
            center: loc,
            zoom: 13
        });

        new google.maps.Marker({
            position: loc,
            map: map
        });
    });
}

/* INIT */
loadStores();
loadOrders();
initMap();

</script>

<script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap" async defer></script>

</body>
</html>
