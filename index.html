<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AccessToExcess</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body { font-family: Arial; margin:0; background:#f5f7f9; }
.header { background:#16a34a; color:white; padding:15px; text-align:center; }

.container { padding:15px; }
.card { background:white; padding:15px; border-radius:12px; margin-bottom:12px; box-shadow:0 3px 8px rgba(0,0,0,0.08); }

button { background:#16a34a; color:white; border:none; padding:10px; border-radius:8px; width:100%; margin-top:8px; }

input { width:100%; padding:10px; margin-top:8px; border-radius:8px; border:1px solid #ddd; }

.hidden { display:none; }
</style>
</head>

<body>

<div class="header">AccessToExcess</div>

<div class="container">

<!-- AUTH -->
<div id="auth">
    <div class="card">
        <h3>Login / Signup</h3>
        <input id="email" placeholder="Email">
        <input id="password" type="password" placeholder="Password">
        <button onclick="signup()">Sign Up</button>
        <button onclick="login()">Login</button>
    </div>
</div>

<!-- APP -->
<div id="app" class="hidden">

    <div class="card">
        <h3>Location</h3>
        <p id="locationText">Detecting...</p>
    </div>

    <div class="card">
        <h3>Stores Nearby</h3>
        <div id="stores"></div>
    </div>

    <div class="card">
        <h3>Cart</h3>
        <div id="cart"></div>
        <button onclick="checkout()">Checkout</button>
    </div>

    <button onclick="logout()">Logout</button>
</div>

</div>

<script>
// 🔥 Firebase Config (REPLACE THIS)
const firebaseConfig = {
    apiKey: "YOUR_KEY",
    authDomain: "YOUR_DOMAIN",
    projectId: "YOUR_ID"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let cart = [];
let userLocation = null;

/* AUTH */
function signup() {
    auth.createUserWithEmailAndPassword(
        email.value, password.value
    );
}

function login() {
    auth.signInWithEmailAndPassword(
        email.value, password.value
    );
}

function logout() {
    auth.signOut();
}

/* AUTH STATE */
auth.onAuthStateChanged(user => {
    if (user) {
        document.getElementById("auth").classList.add("hidden");
        document.getElementById("app").classList.remove("hidden");
        initLocation();
        loadStores();
    } else {
        document.getElementById("auth").classList.remove("hidden");
        document.getElementById("app").classList.add("hidden");
    }
});

/* GPS LOCATION */
function initLocation() {
    navigator.geolocation.getCurrentPosition(pos => {
        userLocation = {
            lat: pos.coords.latitude,
            lon: pos.coords.longitude
        };
        document.getElementById("locationText").innerText =
            `${userLocation.lat.toFixed(4)}, ${userLocation.lon.toFixed(4)}`;
    });
}

/* LOAD STORES (STATIC FOR NOW) */
const stores = [
    { name: "Walmart", items: ["Bread", "Meal"] },
    { name: "Target", items: ["Salad", "Fruit"] }
];

function loadStores() {
    const div = document.getElementById("stores");
    div.innerHTML = "";

    stores.forEach(store => {
        const el = document.createElement("div");
        el.className = "card";
        el.innerHTML = `
            <h4>${store.name}</h4>
            <button onclick="addToCart('${store.name}','${store.items[0]}')">
                Add Item
            </button>
        `;
        div.appendChild(el);
    });
}

/* CART */
function addToCart(store, item) {
    cart.push({ store, item });
    renderCart();
}

function renderCart() {
    const div = document.getElementById("cart");
    div.innerHTML = cart.map(c => `${c.store} - ${c.item}`).join("<br>");
}

/* CHECKOUT */
function checkout() {
    if (cart.length === 0) return alert("Cart empty");

    const order = {
        items: cart,
        created: new Date(),
        user: auth.currentUser.email
    };

    db.collection("orders").add(order);

    alert("Order placed!");
    cart = [];
    renderCart();
}
</script>

</body>
</html>
