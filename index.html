<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AccessToExcess</title>

<style>
:root {
    --green: #16a34a;
    --green-dark: #15803d;
    --bg: #f4f7f5;
    --card: #ffffff;
    --text: #1f2937;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
}

/* Header */
.header {
    background: var(--green);
    color: white;
    padding: 18px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
}

/* Containers */
.container {
    padding: 20px;
    display: none;
}

.active {
    display: block;
}

/* Grid Layout */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 15px;
}

/* Cards */
.card {
    background: var(--card);
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.card:hover {
    transform: translateY(-4px);
    box-shadow: 0 6px 14px rgba(0,0,0,0.12);
}

.card h4 {
    margin: 0 0 8px;
}

/* Buttons */
button {
    background: var(--green);
    color: white;
    border: none;
    padding: 10px;
    border-radius: 8px;
    width: 100%;
    font-size: 15px;
    cursor: pointer;
    transition: background 0.2s ease;
}

button:hover {
    background: var(--green-dark);
}

/* Secondary Button */
.back-btn {
    margin-top: 15px;
    background: #6b7280;
}

.back-btn:hover {
    background: #4b5563;
}

/* Section Titles */
h3 {
    margin-bottom: 15px;
}

/* Price Styling */
.price {
    color: var(--green);
    font-weight: bold;
}
</style>
</head>

<body>

<div class="header">AccessToExcess</div>

<!-- HOME -->
<div id="home" class="container active">
    <h3>Available Stores</h3>

    <div class="grid">
        <div class="card">
            <h4>Walmart</h4>
            <p>Access discounted excess food</p>
            <button onclick="openStore('Walmart')">View Deals</button>
        </div>

        <div class="card">
            <h4>Target</h4>
            <p>Access discounted excess food</p>
            <button onclick="openStore('Target')">View Deals</button>
        </div>
    </div>
</div>

<!-- STORE -->
<div id="store" class="container">
    <h3 id="storeName"></h3>

    <div class="grid" id="storeItems"></div>

    <button class="back-btn" onclick="goHome()">Back</button>
</div>

<!-- ITEM -->
<div id="item" class="container">
    <h3 id="itemName"></h3>
    <p id="itemPrice" class="price"></p>

    <button onclick="reserve()">Reserve</button>
    <button class="back-btn" onclick="goBackStore()">Back</button>
</div>

<!-- CONFIRM -->
<div id="confirm" class="container">
    <h3>Reservation Confirmed</h3>
    <p id="orderNum"></p>

    <button onclick="goHome()">Done</button>
</div>

<script>
// Sample data (easy to expand)
const storeData = {
    "Walmart": [
        { name: "Bakery Bread", price: "$2" },
        { name: "Deli Meal", price: "$4" }
    ],
    "Target": [
        { name: "Fresh Salad", price: "$3" },
        { name: "Fruit Bowl", price: "$5" }
    ]
};

let currentStore = "";

/* Navigation */
function show(screen) {
    document.querySelectorAll('.container').forEach(div => div.classList.remove('active'));
    document.getElementById(screen).classList.add('active');
}

/* Open Store */
function openStore(name) {
    currentStore = name;
    document.getElementById("storeName").innerText = name + " Deals";

    const itemsContainer = document.getElementById("storeItems");
    itemsContainer.innerHTML = "";

    storeData[name].forEach(item => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
            <h4>${item.name}</h4>
            <p class="price">${item.price}</p>
            <button onclick="openItem('${item.name}','${item.price}')">View</button>
        `;
        itemsContainer.appendChild(div);
    });

    show("store");
}

/* Open Item */
function openItem(name, price) {
    document.getElementById("itemName").innerText = name;
    document.getElementById("itemPrice").innerText = "Price: " + price;
    show("item");
}

/* Reserve */
function reserve() {
    let order = Math.floor(Math.random() * 90000) + 10000;
    document.getElementById("orderNum").innerText = "Order #" + order;
    show("confirm");
}

/* Navigation Helpers */
function goHome() {
    show("home");
}

function goBackStore() {
    show("store");
}
</script>

</body>
</html>
